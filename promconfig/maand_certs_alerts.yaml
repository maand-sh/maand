groups:
  - name: maand_certs
    rules:
      - alert: maand cert expiring soon
        expr: maand_cert_expiring == 1 and maand_cert_not_after_seconds > time()
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS cert {{ $labels.cert }} expiring ({{ $labels.job }} on {{ $labels.worker }})"
          description: "Certificate {{ $labels.cert }} for job {{ $labels.job }} on {{ $labels.worker }} is within the maand renewal buffer."

      - alert: maand cert expired
        expr: maand_cert_not_after_seconds < time()
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "TLS cert {{ $labels.cert }} expired ({{ $labels.job }} on {{ $labels.worker }})"
          description: "Certificate {{ $labels.cert }} for job {{ $labels.job }} on {{ $labels.worker }} is past NotAfter. Run maand build && maand deploy."

      - alert: maand ca cert expiring soon
        expr: maand_cert_expiring{scope="ca"} == 1 and maand_cert_not_after_seconds{scope="ca"} > time()
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "maand CA certificate expiring soon"
          description: "Bucket CA is within the maand renewal buffer. Run maand build to rotate."

      - alert: maand ca cert expired
        expr: maand_cert_not_after_seconds{scope="ca"} < time()
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "maand CA certificate expired"
          description: "Bucket CA is past NotAfter. Run maand build && maand deploy immediately."
